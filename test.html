<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VXLinkShare - Test Runner</title>
    <link rel="icon" type="image/png" href="src/icon128.png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0f12;
            --card-bg: #161a22;
            --text-main: #f0f6fc;
            --text-muted: #8b949e;
            --primary: #58a6ff;
            --success: #3fb950;
            --error: #f85149;
            --border: #30363d;
            --shadow: rgba(0, 0, 0, 0.5);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            box-shadow: 0 20px 50px var(--shadow);
            padding: 40px;
            box-sizing: border-box;
            backdrop-filter: blur(20px);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-img {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 10px var(--shadow);
        }

        h1 {
            font-size: 28px;
            font-weight: 800;
            margin: 0;
            background: linear-gradient(135deg, #fff 30%, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-top: 5px;
        }

        .summary-badge {
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .summary-badge.all-passed {
            background-color: rgba(63, 185, 80, 0.15);
            color: var(--success);
            border: 1px solid rgba(63, 185, 80, 0.3);
        }

        .summary-badge.some-failed {
            background-color: rgba(248, 81, 73, 0.15);
            color: var(--error);
            border: 1px solid rgba(248, 81, 73, 0.3);
        }

        .test-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .test-card {
            background-color: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .test-card:hover {
            transform: translateY(-2px);
            border-color: var(--primary);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        .test-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .test-name {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-main);
        }

        .badge {
            font-size: 12px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 6px;
            text-transform: uppercase;
        }

        .badge.pass {
            background-color: rgba(63, 185, 80, 0.15);
            color: var(--success);
            border: 1px solid rgba(63, 185, 80, 0.3);
        }

        .badge.fail {
            background-color: rgba(248, 81, 73, 0.15);
            color: var(--error);
            border: 1px solid rgba(248, 81, 73, 0.3);
        }

        .test-details {
            display: flex;
            flex-direction: column;
            gap: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
        }

        .detail-row {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .detail-label {
            color: var(--text-muted);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .detail-val {
            background-color: rgba(0, 0, 0, 0.2);
            padding: 8px 12px;
            border-radius: 6px;
            word-break: break-all;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .detail-val.expected {
            color: var(--success);
        }

        .detail-val.actual-err {
            color: var(--error);
            border-color: rgba(248, 81, 73, 0.2);
        }

        .detail-val.actual-ok {
            color: var(--success);
            border-color: rgba(63, 185, 80, 0.2);
        }

        footer {
            margin-top: 30px;
            border-top: 1px solid var(--border);
            padding-top: 20px;
            text-align: center;
            color: var(--text-muted);
            font-size: 13px;
        }

        footer a {
            color: var(--primary);
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-section">
                <img class="logo-img" src="src/icon128.png" alt="VXLinkShare logo">
                <div>
                    <h1>VXLinkShare Test Suite</h1>
                    <div class="subtitle">Platform-independent browser test runner</div>
                </div>
            </div>
            <div id="summary-badge" class="summary-badge">Running...</div>
        </header>

        <main class="test-list" id="test-list">
            <!-- Test results will be appended here -->
        </main>

        <footer>
            VXLinkShare Version 3.0 &bull; <a href="DEVELOPMENT.md">Documentation</a>
        </footer>
    </div>

    <!-- Load the shared common conversion logic -->
    <script src="src/common.js"></script>
    <script>
        const testCases = [
            {
                name: "Twitter clean & convert",
                input: "https://twitter.com/user/status/12345?s=20&t=abc",
                expected: "https://vxtwitter.com/user/status/12345"
            },
            {
                name: "X.com clean & convert",
                input: "https://x.com/user/status/67890?spm_id_from=123&from_spmid=456",
                expected: "https://vxtwitter.com/user/status/67890"
            },
            {
                name: "Reddit clean & convert",
                input: "https://www.reddit.com/r/pics/comments/xyz/?utm_source=share&ref_src=twsrc",
                expected: "https://rxddit.com/r/pics/comments/xyz"
            },
            {
                name: "Bilibili blacklist param removal and whitelist retention",
                input: "https://www.bilibili.com/video/BV12345/?spm_id_from=333.788&vd_source=abc&p=2&t=45&some_garbage=123",
                expected: "https://vxbilibili.com/video/BV12345/?p=2&t=45"
            },
            {
                name: "Pixiv clean & convert",
                input: "https://www.pixiv.net/artworks/123456?utm_medium=referral&share_plat=ios",
                expected: "https://phixiv.net/artworks/123456"
            },
            {
                name: "Unrelated sites cleaning generic trackers",
                input: "https://example.com/page?q=hello&spm_id_from=some_tracker&ref_src=direct",
                expected: "https://example.com/page?q=hello"
            }
        ];

        document.addEventListener('DOMContentLoaded', () => {
            const listEl = document.getElementById('test-list');
            const summaryEl = document.getElementById('summary-badge');
            
            listEl.innerHTML = '';
            let failedCount = 0;

            testCases.forEach((tc) => {
                const actual = VX.convert(tc.input);
                const passed = actual === tc.expected;
                
                if (!passed) {
                    failedCount++;
                }

                const card = document.createElement('div');
                card.className = 'test-card';
                
                card.innerHTML = `
                    <div class="test-header">
                        <span class="test-name">${tc.name}</span>
                        <span class="badge ${passed ? 'pass' : 'fail'}">${passed ? 'pass' : 'fail'}</span>
                    </div>
                    <div class="test-details">
                        <div class="detail-row">
                            <span class="detail-label">Input URL</span>
                            <span class="detail-val">${tc.input}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Expected Output</span>
                            <span class="detail-val expected">${tc.expected}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Actual Output</span>
                            <span class="detail-val ${passed ? 'actual-ok' : 'actual-err'}">${actual}</span>
                        </div>
                    </div>
                `;
                
                listEl.appendChild(card);
            });

            if (failedCount === 0) {
                summaryEl.className = 'summary-badge all-passed';
                summaryEl.textContent = 'All Passed';
            } else {
                summaryEl.className = 'summary-badge some-failed';
                summaryEl.textContent = `${failedCount} Failed`;
            }
        });
    </script>
</body>
</html>
