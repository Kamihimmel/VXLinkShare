<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VX Link Helper - Settings</title>
    <link rel="icon" type="image/png" href="icon128.png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="options.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-section">
                <img class="logo-img" src="icon128.png" alt="VXLinkShare logo">
                <div class="header-title">
                    <h1 data-i18n="title">VX Link Helper Settings</h1>
                    <p class="version">v3.0</p>
                </div>
            </div>
        </header>

        <main>
            <!-- Language Settings -->
            <section class="settings-section">
                <h2 data-i18n="language">Language / 语言</h2>
                <div class="setting-item">
                    <label for="language" data-i18n="selectLanguage">Select Language:</label>
                    <select id="language">
                                            <option value="system" data-i18n="systemDefault">System Default</option>
                                        </select>
                </div>
            </section>

            <!-- Site Activation Settings -->
            <section class="settings-section">
                <h2 data-i18n="enableSites">Enable Sites</h2>
                <p class="section-desc" data-i18n="toggleDesc">Toggle VX button appearance on each site</p>
                
                <!-- Toggles are generated from the site registry by options.js -->
                <div class="toggle-grid" id="toggle-grid"></div>
            </section>

            <!-- Credits Section -->
            <section class="settings-section credits-section">
                <h2 data-i18n="credits">Credits & Thanks</h2>
                <p class="section-desc" data-i18n="creditsDesc">This plugin relies on the following amazing open-source projects:</p>
                
                <!-- Credits are generated from the site registry by options.js -->
                <div class="credits-list" id="credits-list"></div>
            </section>

            <!-- Status Message -->
            <div id="status" class="status-message"></div>
        </main>

        <footer>
            <button id="reset-button" class="btn btn-secondary" data-i18n="resetBtn">Reset to Defaults</button>
        </footer>
    </div>

    <script src="common.js"></script>
    <script src="sites.js"></script>
    <script src="options.js"></script>
</body>
</html>
